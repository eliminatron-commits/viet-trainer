<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aussprache-Vergleich</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #10241a; color: #eef7f1; margin: 0; padding: 16px; }
    h1 { font-size: 1.3rem; }
    p.hint { color: #9dbfae; font-size: 0.9rem; line-height: 1.5; }
    .word { background: #1a3628; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    .vn { font-size: 1.6rem; font-weight: 700; margin-bottom: 2px; }
    .de { color: #9dbfae; font-size: 0.9rem; margin-bottom: 12px; }
    .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .row button { flex: 0 0 auto; min-width: 56px; min-height: 48px; border: 0; border-radius: 10px;
      background: #1c8a5a; color: #fff; font-size: 1.3rem; cursor: pointer; }
    .row.south button { background: #b8860b; }
    .label { font-size: 0.9rem; }
    .label b { display: block; }
    .label span { color: #9dbfae; font-size: 0.78rem; }
    .south .label b { color: #ffd447; }
  </style>
</head>
<body>
  <h1>🔊 Aussprache-Vergleich: „gi"</h1>
  <p class="hint">Tippe jeweils auf 🔊. <b style="color:#2ecc71">Grün</b> = aktuelle App-Stimme (Nord/Hanoi, „gi" ≈ s/z).
  <b style="color:#ffd447">Gold</b> = Google-Süd-Stimme (Saigon/Zentrum, „gi" ≈ j — näher an Da Nang).
  Sag mir danach, welche dir am besten gefällt.</p>

  <div id="list"></div>

  <script>
    var words = [
      { key: "s005", vn: "không có gì", de: "gern geschehen" },
      { key: "s091", vn: "gì",          de: "was" },
      { key: "s054", vn: "bây giờ",     de: "jetzt" },
      { key: "s041", vn: "gia đình",    de: "Familie" },
      { key: "s046", vn: "chị gái",     de: "ältere Schwester (anderes „g“)" }
    ];
    var variants = [
      { suffix: "edge_hoaimy",  label: "Nord ♀ (aktuell)", sub: "edge-tts HoaiMy", cls: "" },
      { suffix: "edge_namminh", label: "Nord ♂",           sub: "edge-tts NamMinh", cls: "" },
      { suffix: "gtts_sued",    label: "Süd (Google)",     sub: "gTTS – „gi“ wie j", cls: "south" }
    ];
    var list = document.getElementById("list");
    words.forEach(function (w) {
      var card = document.createElement("div");
      card.className = "word";
      card.innerHTML = "<div class='vn'>" + w.vn + "</div><div class='de'>" + w.de + "</div>";
      variants.forEach(function (v) {
        var row = document.createElement("div");
        row.className = "row " + v.cls;
        var btn = document.createElement("button");
        btn.textContent = "🔊";
        var src = w.key + "_" + v.suffix + ".mp3";
        btn.addEventListener("click", function () { new Audio(src).play(); });
        var lbl = document.createElement("div");
        lbl.className = "label";
        lbl.innerHTML = "<b>" + v.label + "</b><span>" + v.sub + "</span>";
        row.appendChild(btn);
        row.appendChild(lbl);
        card.appendChild(row);
      });
      list.appendChild(card);
    });
  </script>
</body>
</html>
