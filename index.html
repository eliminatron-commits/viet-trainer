<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover: iPhone-Notch/Home-Indicator via env(safe-area-inset-*) in CSS behandeln -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Việt-Trainer</title>

  <!-- iOS-PWA: Standalone-Modus vom Homescreen, Statusbar in App-Farbe -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Việt-Trainer">
  <meta name="theme-color" content="#1c0707">
  <!-- iOS ignoriert Manifest-Icons; apple-touch-icon ist Pflicht fürs Homescreen-Icon -->
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Atmosphärischer Hintergrund: drei weich auslaufende Farbfelder, die langsam
       driften (nur transform-Animation, kein CSS-filter -> flüssig auf iPhone). -->
  <div id="aurora" aria-hidden="true"><i class="a1"></i><i class="a2"></i><i class="a3"></i></div>
  <!-- Effekt-Ebene für Konfetti (pointer-events:none, über allem) -->
  <div id="fx" aria-hidden="true"></div>

  <!-- App-Shell: Kopfzeile (XP/Streak) + ein Container, in den VT.UI die Screens rendert.
       DOM-basierte UI (kein Canvas): Listen, Buttons und Text sind mit nativem DOM
       touch-freundlicher und barriereärmer als Canvas-Zeichnung. -->
  <header id="topbar">
    <span id="hud-streak" title="Tages-Streak">🔥 0</span>
    <span id="hud-title">Việt-Trainer</span>
    <span id="hud-xp" title="Erfahrungspunkte">⭐ 0 XP</span>
  </header>
  <main id="screen"><!-- aktiver Screen (VT.UI) --></main>

  <!-- Untere Tab-Navigation (nur auf Haupt-Screens sichtbar, VT.UI steuert
       Sichtbarkeit + aktiven Zustand). Während einer Session ausgeblendet. -->
  <nav id="tabbar">
    <button class="tab" type="button" data-tab="home">
      <span class="tab-icon">🎯</span><span class="tab-label">Lernen</span>
    </button>
    <button class="tab" type="button" data-tab="sentences">
      <span class="tab-icon">📝</span><span class="tab-label">Sätze</span>
    </button>
    <button class="tab" type="button" data-tab="stats">
      <span class="tab-icon">📊</span><span class="tab-label">Statistik</span>
    </button>
  </nav>

  <!-- Klassische Skripte in Abhängigkeitsreihenfolge (keine ES-Module, kein Build):
       Daten -> Persistenz -> SRS -> Audio -> Quiz -> UI -> App.
       Jede Datei beginnt mit "var VT = ..." (nie const: kollidiert über klassische
       Skripte hinweg im globalen Scope). -->
  <script src="js/data.js"></script>
  <script src="js/sentences.js"></script>
  <script src="js/pronouns.js"></script>
  <script src="js/level.js"></script>
  <script src="js/store.js"></script>
  <script src="js/srs.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/sentence-quiz.js"></script>
  <script src="js/pronoun-quiz.js"></script>
  <script src="js/review-quiz.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
